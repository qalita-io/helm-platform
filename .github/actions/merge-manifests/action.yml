name: Create Multi-Arch Manifests
description: Download digests and create multi-arch manifest

inputs:
  image-name:
    description: 'Full image name (registry/org/image)'
    required: true
  tag:
    description: 'Image tag'
    required: true
  is-latest:
    description: 'Also create :latest tag (true/false)'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Clean up old digests
      shell: bash
      run: rm -rf /tmp/digests

    - name: Download digests
      uses: actions/download-artifact@v8
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create manifest
      shell: bash
      working-directory: /tmp/digests
      run: |
        TAG="${{ inputs.tag }}"
        IMAGE="${{ inputs.image-name }}"

        DIGESTS=$(printf "${IMAGE}@sha256:%s " *)

        docker buildx imagetools create -t ${IMAGE}:${TAG} ${DIGESTS}

        if [ "${{ inputs.is-latest }}" == "true" ]; then
          docker buildx imagetools create -t ${IMAGE}:latest ${DIGESTS}
        fi

    - name: Inspect manifest
      shell: bash
      run: |
        docker buildx imagetools inspect ${{ inputs.image-name }}:${{ inputs.tag }}
