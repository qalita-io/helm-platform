name: Setup Infisical Secrets
description: Fetch secrets from Infisical vault

inputs:
  project-slug:
    description: 'Infisical project slug'
    required: false
    default: 'kubernetes'
  env-slug:
    description: 'Infisical environment slug'
    required: false
    default: 'prod'
  domain:
    description: 'Infisical domain URL'
    required: false
    default: 'https://vault.armandleopold.fr'

runs:
  using: composite
  steps:
    - name: Fetch secrets from Infisical
      uses: Infisical/secrets-action@v1.0.16
      with:
        method: universal
        client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
        client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        project-slug: ${{ inputs.project-slug }}
        env-slug: ${{ inputs.env-slug }}
        secret-path: /
        export-type: env
        domain: ${{ inputs.domain }}
